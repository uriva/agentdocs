services:
  - type: web
    name: agentdocs-web
    runtime: node
    plan: free
    rootDir: web
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_INSTANT_APP_ID
        value: 61bedee5-2c95-4e5a-9e20-9531182b18fc
      - key: NEXT_PUBLIC_API_URL
        value: https://agentdocs-api.uriva.deno.net
